<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Congratulations!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;

    background:linear-gradient(
        135deg,
        #ff9a9e,
        #fecfef,
        #f6d365,
        #fda085
    );

    background-size:400% 400%;
    animation:bgMove 8s ease infinite;
}

@keyframes bgMove{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

.message{
    position:absolute;
    white-space:nowrap;
    font-size:4rem;
    font-weight:bold;
    color:white;

    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff69b4,
        0 0 40px #ff69b4,
        0 0 60px #ff69b4;

    animation:
        moveAcross 8s linear infinite,
        jump 0.8s ease-in-out infinite;
}

@keyframes moveAcross{
    from{
        left:-100%;
    }
    to{
        left:100%;
    }
}

@keyframes jump{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-35px);
    }
}
</style>

</head>
<body>

<div class="message">
    🎉 Congratulations! 🎉
</div>

</body>
</html>
